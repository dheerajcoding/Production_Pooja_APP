# /etc/nginx/sites-available/saral-pooja
# Install:
#   sudo cp nginx.conf /etc/nginx/sites-available/saral-pooja
#   sudo ln -sf /etc/nginx/sites-available/saral-pooja /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 72.62.192.33;

    # Increase upload size for admin video uploads
    client_max_body_size 100M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ─── UPLOADED FILES ─────────────────────────────────────────────────────
    # NOTE: `^~` modifier is CRITICAL — without it, the regex block below
    # (`~* \.(png|jpg|...)`) would match first and serve from the wrong root.
    # DO NOT remove the `^~` unless you also delete the regex block.
    location ^~ /uploads/ {
        alias /var/www/saral-pooja/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header Access-Control-Allow-Origin "*";
    }

    # ─── API — proxy to Node.js backend ─────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 100M;
    }

    # ─── Frontend SPA (if built) ────────────────────────────────────────────
    root /var/www/saral-pooja/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache JS/CSS/etc. assets — regex block, hence the `^~` above
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny hidden files
    location ~ /\. { deny all; }

    access_log /var/log/nginx/saral-pooja-access.log;
    error_log  /var/log/nginx/saral-pooja-error.log;
}
